<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 400">
  <defs>
    <linearGradient id="bannerGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#764ba2;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f093fb;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="400" fill="url(#bannerGradient)"/>
  
  <!-- Logo icon -->
  <g transform="translate(200, 200) scale(0.6)">
    <rect x="-120" y="-100" width="240" height="180" rx="12" fill="none" stroke="white" stroke-width="16" opacity="0.9"/>
    <path d="M -100 -20 L -40 -80 L 20 -20 L 60 -60 L 100 -20 L 100 60 L -100 60 Z" 
          fill="none" stroke="white" stroke-width="12" stroke-linejoin="round" opacity="0.9"/>
    <circle cx="60" cy="-50" r="20" fill="white" opacity="0.9"/>
    <g transform="translate(0, 140)">
      <path d="M -80 0 L -40 0 M -50 -10 L -40 0 L -50 10" 
            stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
      <path d="M 80 0 L 40 0 M 50 -10 L 40 0 L 50 10" 
            stroke="white" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none" opacity="0.9"/>
    </g>
  </g>
  
  <!-- Title -->
  <text x="650" y="160" text-anchor="middle" fill="white" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="72" font-weight="bold" filter="url(#glow)">Quick Compress</text>
  
  <!-- Subtitle -->
  <text x="650" y="220" text-anchor="middle" fill="white" 
        font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
        font-size="32" opacity="0.9">Optimize images for the web in seconds</text>
  
  <!-- Features -->
  <g transform="translate(650, 290)" text-anchor="middle" fill="white" 
     font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
     font-size="20" opacity="0.8">
    <text x="-250" y="0">⚡ WebP Conversion</text>
    <text x="0" y="0">📐 Smart Resizing</text>
    <text x="250" y="0">🎯 Under 500KB</text>
  </g>
</svg>