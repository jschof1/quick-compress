<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Background gradient -->
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#667eea;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#764ba2;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="iconGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#e0e0e0;stop-opacity:1" />
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-opacity="0.3"/>
    </filter>
  </defs>
  
  <!-- Main rounded rectangle background -->
  <rect x="32" y="32" width="448" height="448" rx="80" ry="80" fill="url(#bgGradient)" filter="url(#shadow)"/>
  
  <!-- Image frame/icon -->
  <g transform="translate(256, 256)">
    <!-- Photo icon -->
    <rect x="-120" y="-100" width="240" height="180" rx="12" fill="none" stroke="url(#iconGradient)" stroke-width="16"/>
    
    <!-- Mountain/landscape inside -->
    <path d="M -100 -20 L -40 -80 L 20 -20 L 60 -60 L 100 -20 L 100 60 L -100 60 Z" 
          fill="none" stroke="url(#iconGradient)" stroke-width="12" stroke-linejoin="round"/>
    
    <!-- Sun -->
    <circle cx="60" cy="-50" r="20" fill="url(#iconGradient)"/>
    
    <!-- Compression arrows -->
    <g transform="translate(0, 140)">
      <!-- Left arrow (pointing right) -->
      <path d="M -80 0 L -40 0 M -50 -10 L -40 0 L -50 10" 
            stroke="url(#iconGradient)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      
      <!-- Right arrow (pointing left) -->
      <path d="M 80 0 L 40 0 M 50 -10 L 40 0 L 50 10" 
            stroke="url(#iconGradient)" stroke-width="14" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
      
      <!-- WebP text -->
      <text x="0" y="8" text-anchor="middle" fill="url(#iconGradient)" 
            font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" 
            font-size="32" font-weight="bold">WebP</text>
    </g>
  </g>
</svg>